name: Ejecucion Paola

on:
  push:
    branches: [main] 

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      # Give the defaults GITHUB_TOKEN write permission to commit and push the
      # added or changed files to the repository.
      contents: write

    steps:
      - name: checkout repositorio
        uses: actions/checkout@v6

      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Run script
        run: python ./stats.py 
        
      - name: commit y push de cambios
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: Update de estadísticas Paola
          commit_user_name: Paola-1984
          commit_user_email: rguachamin@estud.tesa.edu.ec
          commit_author: Paola-1984 <rguachamin@estud.tesa.edu.ec
